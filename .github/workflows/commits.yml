name: Commits

on:
  pull_request:
    branches:
      - main

env:
  MISE_TASK_RUN_AUTO_INSTALL: "false"

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Mise
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2
        with:
          install_args: bun npm:commitlint

      - name: Run commitlint
        run: mise lint:commit ${{ github.event.pull_request.base.sha }} ${{ github.sha }}
