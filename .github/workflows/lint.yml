name: Lint

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Linters
    runs-on: ubuntu-latest
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install lint tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: node bun npm:prettier aqua:koalaman/shellcheck

      - name: Run linters
        run: mise lint --fix

      - name: Verify linters produced no changes
        run: git diff --exit-code

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: node bun npm:commitlint

      - name: Validate PR commits
        run: mise lint:commit ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
